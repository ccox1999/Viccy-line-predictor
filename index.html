<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
  >
  <title>Victoria Line Motion Lab</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="app-shell">

    <header class="app-header">
      <h1>Victoria Line Motion Lab</h1>
      <p class="subtitle">
        Record iPhone motion data and visualise accelerations and rotations
      </p>
    </header>

    <section class="card status-card">
      <div class="status-header">
        <div class="status-title">Session status</div>
        <div id="sessionState" class="status-value">Idle</div>
      </div>

      <div class="status-body">
        <div class="status-row">
          <span>Total samples</span>
          <span id="sampleCount">0</span>
        </div>
        <div class="status-row">
          <span>Duration</span>
          <span id="duration">0.0 s</span>
        </div>
      </div>
    </section>

    <section class="card controls-card">
      <div id="sensorStatus" class="status-pill status-pill--pending">
        Motion permission: Not requested
      </div>

      <div class="controls-row">
        <button id="sensorBtn" class="btn btn-primary">
          Enable Motion Sensors
        </button>
        <button id="recordBtn" class="btn btn-secondary" disabled>
          Start Recording
        </button>
      </div>

      <div class="controls-row">
        <button id="saveBtn" class="btn btn-outline" disabled>
          Save Recording
        </button>
        <button id="clearBtn" class="btn btn-outline" disabled>
          Clear
        </button>
      </div>
    </section>

    <!-- ACCEL -->
    <section class="card chart-card">
      <div class="chart-header">
        <div class="chart-title">Acceleration (g)</div>

        <div class="chart-legend icon-legend">

          <!-- AX (side-to-side) -->
          <div class="legend-item ax">
            <svg viewBox="0 0 40 40">
              <rect x="18" y="6" width="4" height="28" rx="2"/>
              <line x1="10" y1="20" x2="18" y2="20"/>
              <line x1="30" y1="20" x2="22" y2="20"/>
              <polyline points="12,18 10,20 12,22"/>
              <polyline points="28,18 30,20 28,22"/>
            </svg>
          </div>

          <!-- AY (up/down) -->
          <div class="legend-item ay">
            <svg viewBox="0 0 40 40">
              <rect x="18" y="6" width="4" height="28" rx="2"/>
              <line x1="20" y1="10" x2="20" y2="16"/>
              <line x1="20" y1="30" x2="20" y2="24"/>
              <polyline points="18,12 20,10 22,12"/>
              <polyline points="18,28 20,30 22,28"/>
            </svg>
          </div>

          <!-- AZ (in/out screen) -->
          <div class="legend-item az">
            <svg viewBox="0 0 40 40">
              <rect x="19" y="8" width="2" height="24" rx="1"/>
              <polygon points="20,6 17,12 23,12"/>
              <polygon points="20,34 17,28 23,28"/>
            </svg>
          </div>

        </div>
      </div>

      <canvas id="accelChart"></canvas>
    </section>

    <!-- GYRO -->
    <section class="card chart-card">
      <div class="chart-header">
        <div class="chart-title">Rotation (°/s)</div>

        <div class="chart-legend icon-legend">

          <!-- ALPHA (twist) -->
          <div class="legend-item alpha">
            <svg viewBox="0 0 40 40">
              <rect x="18" y="6" width="4" height="28" rx="2"/>
              <path d="M12 20a8 8 0 0 1 16 0"/>
              <polyline points="24,16 28,18 24,20"/>
            </svg>
          </div>

          <!-- BETA (tilt) -->
          <div class="legend-item beta">
            <svg viewBox="0 0 40 40">
              <rect x="18" y="6" width="4" height="28" rx="2"/>
              <polyline points="14,14 20,8 26,14"/>
            </svg>
          </div>

          <!-- GAMMA (roll) -->
          <div class="legend-item gamma">
            <svg viewBox="0 0 40 40">
              <rect x="18" y="6" width="4" height="28" rx="2"/>
              <path d="M14 16Q20 10 26 16"/>
            </svg>
          </div>

        </div>
      </div>

      <canvas id="gyroChart"></canvas>
    </section>

  </div>

  <script src="app.js"></script>
</body>
</html>
